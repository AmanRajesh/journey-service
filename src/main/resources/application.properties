spring.application.name=FVN

spring.kafka.bootstrap-servers=fvn-kafka:9092
# ===============================
# POSTGRES R2DBC (For your Java App)
# ===============================
spring.r2dbc.url=r2dbc:postgresql://fvn-postgres:5432/fogvision_db
spring.r2dbc.username=postgres
spring.r2dbc.password=password

spring.datasource.url=jdbc:postgresql://fvn-postgres:5432/fogvision_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
# ===============================
# FLYWAY JDBC (For Database Migrations)
# ===============================
spring.flyway.enabled=false
spring.flyway.url=jdbc:postgresql://fvn-postgres:5432/fogvision_db
spring.flyway.user=postgres
spring.flyway.password=password
spring.flyway.baseline-on-migrate=true


# Tell Flyway where the scripts are (to be safe)
spring.flyway.locations=classpath:db/migration
