events {
    worker_connections 1024;
}

http {
    # Ensure Ngrok headers and real IPs are passed down to your Spring Boot apps
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header ngrok-skip-browser-warning "true";

    server {
        listen 8080;

        # Route requests to the Prediction Service (Port 8091)
        location /prediction/ {
            proxy_pass http://prediction-service:8091/;
        }

        # Route requests to the Location Service (Port 8090)
        location /location/ {
            proxy_pass http://location-service:8090/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }

        # Route requests to the Alert Service (Port 8092)
        location /alert/ {
            proxy_pass http://alert-service:8092/;
        }

        # Route requests to the Journey Service
        # Uses the container name 'fvn-journey-service' and internal port '8080'
        location /journey/ {
            proxy_pass http://fvn-journey-service:8080/;
        }
    }
}